name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: test "v$(tr -d '[:space:]' < VERSION)" = "$GITHUB_REF_NAME"

      - name: Build DMG
        run: ./build-dmg.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/Pomote-*.dmg \
            dist/Pomote-*.dmg.sha256 \
            --title "$GITHUB_REF_NAME" \
            --notes-file "release-notes/$GITHUB_REF_NAME.md" \
            --verify-tag
